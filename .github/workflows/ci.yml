name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22.x, 24.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install SQLite on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Install SQLite on Windows
        if: runner.os == 'Windows'
        run: choco install sqlite --no-progress -y

      - name: Verify SQLite FTS5 trigram prerequisite
        shell: bash
        run: |
          test "$(sqlite3 :memory: "PRAGMA temp_store=FILE; PRAGMA temp_store;")" = "1"
          sqlite3 :memory: "CREATE VIRTUAL TABLE probe USING fts5(text, tokenize='trigram case_sensitive 1'); SELECT json_array_length('[]'), length(readfile('package.json'));"

      - name: Install dependencies (npm ci)
        run: npm ci

      # "prepare" runs during npm ci and builds dist/, but keep an explicit build step for clarity if needed later.
      - name: Build (tsc)
        run: npm run build

      - name: Run tests
        run: npm test
